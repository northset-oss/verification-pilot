# Sign only the exact artifact emitted by a successful CI run for a main-branch push.
name: attest-bundle

on:
  workflow_run:
    workflows: ["ci"]
    types: [completed]

permissions: {}

jobs:
  attest:
    if: github.event.workflow_run.conclusion == 'success' && github.event.workflow_run.event == 'push' && github.event.workflow_run.head_branch == 'main'
    runs-on: ubuntu-latest
    permissions:
      actions: read
      id-token: write
      attestations: write
      contents: write
    steps:
      - name: Download the CI-validated handoff
        uses: actions/download-artifact@d3f86a106a0bac45b974a628896c90dbdf5c8093 # v4
        with:
          name: ci-release-${{ github.event.workflow_run.head_sha }}
          path: handoff
          github-token: ${{ github.token }}
          run-id: ${{ github.event.workflow_run.id }}

      - name: Validate handoff metadata
        id: handoff
        env:
          EXPECTED_SHA: ${{ github.event.workflow_run.head_sha }}
        run: |
          set -euo pipefail
          test "$(jq -r '.schema_version' handoff/metadata.json)" = "1"
          test "$(jq -r '.head_sha' handoff/metadata.json)" = "$EXPECTED_SHA"
          no_op="$(jq -r '.no_op' handoff/metadata.json)"
          echo "no_op=$no_op" >> "$GITHUB_OUTPUT"
          if [ "$no_op" = "true" ]; then exit 0; fi
          mission="$(jq -r '.mission_id' handoff/metadata.json)"
          bundle="$(jq -r '.bundle' handoff/metadata.json)"
          digest="$(jq -r '.bundle_digest' handoff/metadata.json)"
          tag="$(jq -r '.release_tag' handoff/metadata.json)"
          [[ "$mission" =~ ^M-([0-9]{3,}|E2[a-c])$ ]]
          [[ "$bundle" =~ ^run-record-${mission}-[0-9a-f]{12}\.tar\.gz$ ]]
          [[ "$tag" =~ ^run-record-${mission}-[0-9a-f]{12}$ ]]
          [[ "$digest" =~ ^sha256:[0-9a-f]{64}$ ]]
          test -f "handoff/$bundle"
          echo "mission=$mission" >> "$GITHUB_OUTPUT"
          echo "bundle=$bundle" >> "$GITHUB_OUTPUT"
          echo "release_tag=$tag" >> "$GITHUB_OUTPUT"

      - name: Attest exact bundle provenance
        if: steps.handoff.outputs.no_op == 'false'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: handoff/${{ steps.handoff.outputs.bundle }}

      - name: Publish exact signed bytes
        if: steps.handoff.outputs.no_op == 'false'
        env:
          GH_TOKEN: ${{ github.token }}
          REPOSITORY: ${{ github.repository }}
          MISSION: ${{ steps.handoff.outputs.mission }}
          BUNDLE: ${{ steps.handoff.outputs.bundle }}
          TAG: ${{ steps.handoff.outputs.release_tag }}
        run: |
          set -euo pipefail
          notes="$(cat <<EOF
          Attested run-record bundle for ${MISSION}. Signed provenance records artifact origin; it does not witness execution or imply maintainer approval.

          Maintain an open-source project? Request a private run for a PR already in your queue at oss@northset.ai. Nothing is published without your approval.
          EOF
          )"
          gh release view "$TAG" -R "$REPOSITORY" >/dev/null 2>&1 || gh release create "$TAG" -R "$REPOSITORY" --title "Run record ${MISSION}" --notes "$notes"
          gh release upload "$TAG" "handoff/$BUNDLE" -R "$REPOSITORY"
