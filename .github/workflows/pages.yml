# Deploy from the trusted default-branch workflow after main CI or an exact receipts signal.
name: pages

on:
  workflow_run:
    workflows: ["ci", "receipt-pages-source"]
    types: [completed]
    branches: [main, receipts]

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      ((github.event.workflow_run.name == 'ci' &&
      github.event.workflow_run.head_branch == 'main') ||
      (github.event.workflow_run.name == 'receipt-pages-source' &&
      github.event.workflow_run.head_branch == 'receipts'))
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      attestations: write
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Resolve the exact trusted ledger source revision
        id: ledger-source
        env:
          GH_TOKEN: ${{ github.token }}
          CI_LEDGER_SHA: ${{ github.event.workflow_run.name == 'ci' && github.event.workflow_run.head_sha || '' }}
        run: |
          set -euo pipefail
          if [[ -n "$CI_LEDGER_SHA" ]]; then
            ledger_sha="$CI_LEDGER_SHA"
          else
            ledger_sha="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/main" --jq .object.sha)"
          fi
          [[ "$ledger_sha" =~ ^[0-9a-f]{40}$ ]]
          echo "sha=$ledger_sha" >> "$GITHUB_OUTPUT"
      - name: Check out the trusted ledger source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.ledger-source.outputs.sha }}
          path: source
      - name: Verify the exact trusted ledger revision
        env:
          EXPECTED_LEDGER_SHA: ${{ steps.ledger-source.outputs.sha }}
        run: test "$(git -C source rev-parse HEAD)" = "$EXPECTED_LEDGER_SHA"
      - name: Resolve the exact factory proof source revision
        id: receipt-source
        env:
          GH_TOKEN: ${{ github.token }}
          RECEIPTS_EVENT_SHA: ${{ github.event.workflow_run.name == 'receipt-pages-source' && github.event.workflow_run.head_sha || '' }}
        run: |
          set -euo pipefail
          if [[ -n "$RECEIPTS_EVENT_SHA" ]]; then
            receipts_sha="$RECEIPTS_EVENT_SHA"
          else
            receipts_sha="$(gh api "repos/$GITHUB_REPOSITORY/git/ref/heads/receipts" --jq .object.sha)"
          fi
          [[ "$receipts_sha" =~ ^[0-9a-f]{40}$ ]]
          echo "sha=$receipts_sha" >> "$GITHUB_OUTPUT"
      - name: Check out the exact factory proof source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ steps.receipt-source.outputs.sha }}
          path: factory-proof-source
          fetch-depth: 2
      - name: Verify the exact receipts revision
        env:
          EXPECTED_RECEIPTS_SHA: ${{ steps.receipt-source.outputs.sha }}
        run: test "$(git -C factory-proof-source rev-parse HEAD)" = "$EXPECTED_RECEIPTS_SHA"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Merge factory proofs into the canonical ledger index
        env:
          FACTORY_LEDGER_INDEX: ${{ runner.temp }}/ledger-with-factory-receipts.json
          EXPECTED_RECEIPTS_SHA: ${{ steps.receipt-source.outputs.sha }}
        run: >-
          node source/bin/factory-receipts.mjs merge
          --receipts factory-proof-source/receipts
          --receipts-revision "$EXPECTED_RECEIPTS_SHA"
          --index source/missions/index.json
          --out "$FACTORY_LEDGER_INDEX"
      - name: Select newly published proof subjects
        id: proof-subjects
        if: github.event.workflow_run.name == 'receipt-pages-source'
        env:
          EXPECTED_RECEIPTS_SHA: ${{ steps.receipt-source.outputs.sha }}
          SUBJECT_DIR: ${{ runner.temp }}/factory-proof-subjects
        run: |
          set -euo pipefail
          node source/bin/factory-receipts.mjs select-attestation-subjects \
            --repo factory-proof-source \
            --receipts-revision "$EXPECTED_RECEIPTS_SHA" \
            --out "$SUBJECT_DIR"
          shopt -s nullglob
          subjects=("$SUBJECT_DIR"/*.json)
          if ((${#subjects[@]})); then
            (cd "$SUBJECT_DIR" && sha256sum -- *.json > subjects.sha256)
            echo 'present=true' >> "$GITHUB_OUTPUT"
          else
            echo 'present=false' >> "$GITHUB_OUTPUT"
          fi
      - name: Attest newly published proof subjects
        if: steps.proof-subjects.outputs.present == 'true'
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: ${{ runner.temp }}/factory-proof-subjects/*.json
      - name: Confirm attested proof subjects are unchanged
        if: steps.proof-subjects.outputs.present == 'true'
        env:
          SUBJECT_DIR: ${{ runner.temp }}/factory-proof-subjects
        run: cd "$SUBJECT_DIR" && sha256sum --check --strict subjects.sha256
      - name: Render every receipt through the canonical ledger renderer
        env:
          FACTORY_LEDGER_INDEX: ${{ runner.temp }}/ledger-with-factory-receipts.json
          RENDERED_SITE: ${{ runner.temp }}/rendered-site
          LEDGER_SOURCE_OID: ${{ steps.ledger-source.outputs.sha }}
          RECEIPTS_SOURCE_OID: ${{ steps.receipt-source.outputs.sha }}
        run: >-
          node source/bin/ledger.mjs render
          --index "$FACTORY_LEDGER_INDEX"
          --out "$RENDERED_SITE/index.html"
          &&
          node source/bin/publication-policy.mjs validate
          --site "$RENDERED_SITE"
          --index "$FACTORY_LEDGER_INDEX"
          &&
          node source/bin/publication-policy.mjs manifest
          --site "$RENDERED_SITE"
          --index "$FACTORY_LEDGER_INDEX"
          --ledger-source-oid "$LEDGER_SOURCE_OID"
          --receipts-source-oid "$RECEIPTS_SOURCE_OID"
          &&
          node source/bin/publication-policy.mjs verify-manifest
          --site "$RENDERED_SITE"
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: ${{ runner.temp }}/rendered-site
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
      - name: Verify deployed bytes match the source manifest
        env:
          RENDERED_SITE: ${{ runner.temp }}/rendered-site
          DEPLOYMENT_URL: ${{ steps.deployment.outputs.page_url }}
        run: >-
          node source/bin/publication-policy.mjs verify-live
          --site "$RENDERED_SITE"
          --base-url "$DEPLOYMENT_URL"
