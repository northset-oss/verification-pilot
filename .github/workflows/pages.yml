# Deploy from the trusted default-branch workflow after main CI or an exact receipts signal.
name: pages

on:
  workflow_run:
    workflows: ["ci", "receipt-pages-source"]
    types: [completed]
    branches: [main, receipts]

permissions: {}

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    if: >-
      github.event.workflow_run.conclusion == 'success' &&
      github.event.workflow_run.event == 'push' &&
      ((github.event.workflow_run.name == 'ci' &&
      github.event.workflow_run.head_branch == 'main') ||
      (github.event.workflow_run.name == 'receipt-pages-source' &&
      github.event.workflow_run.head_branch == 'receipts'))
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    permissions:
      contents: read
      pages: write
      id-token: write
    steps:
      - name: Check out the trusted ledger source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.name == 'ci' && github.event.workflow_run.head_sha || github.sha }}
          path: source
      - name: Check out the exact compact receipt source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.event.workflow_run.name == 'receipt-pages-source' && github.event.workflow_run.head_sha || 'receipts' }}
          path: compact
      - name: Verify the exact receipts revision
        if: github.event.workflow_run.name == 'receipt-pages-source'
        env:
          EXPECTED_RECEIPTS_SHA: ${{ github.event.workflow_run.head_sha }}
        run: test "$(git -C compact rev-parse HEAD)" = "$EXPECTED_RECEIPTS_SHA"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Validate and render compact factory receipts
        run: >-
          node source/bin/compact-receipts.mjs render
          --receipts compact/receipts
          --site source/site
      - uses: actions/configure-pages@983d7736d9b0ae728b81ab479565c72886d7745b # v5
      - uses: actions/upload-pages-artifact@56afc609e74202658d3ffba0e8f6dda462b719fa # v3
        with:
          path: source/site
      - id: deployment
        uses: actions/deploy-pages@d6db90164ac5ed86f2b6aed7e0febac5b3c0c03e # v4
