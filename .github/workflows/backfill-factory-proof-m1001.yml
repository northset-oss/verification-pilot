name: backfill factory proof M-1001

on:
  workflow_dispatch:

permissions:
  contents: read
  id-token: write
  attestations: write

jobs:
  attest:
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - name: Check out trusted selector source
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: ${{ github.sha }}
          path: source
      - name: Verify trusted selector source
        env:
          EXPECTED_SOURCE_SHA: ${{ github.sha }}
        run: test "$(git -C source rev-parse HEAD)" = "$EXPECTED_SOURCE_SHA"
      - name: Check out the immutable M-1001 proof revision
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          ref: e3295a00ff8c005a335b225c7257ae194d5603bc
          path: factory-proof-source
          fetch-depth: 1
      - name: Verify the immutable proof revision
        run: >-
          test "$(git -C factory-proof-source rev-parse HEAD)" =
          "e3295a00ff8c005a335b225c7257ae194d5603bc"
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Select and verify the exact M-1001 proof subject
        env:
          SUBJECT_DIR: ${{ runner.temp }}/factory-proof-m1001
          SUBJECT_NAME: M-1001-370bc991d0d42c746b2f0e3240dbdc529813adf0-proof.json
          EXPECTED_PROOF_SHA256: b540c9aa3cb6152b226da7ae6a8bacf4cb43de1fe83064f1e5c779914ed9aca7
        run: |
          set -euo pipefail
          node source/bin/factory-receipts.mjs select-attestation-subjects \
            --repo factory-proof-source \
            --receipts-revision e3295a00ff8c005a335b225c7257ae194d5603bc \
            --out "$SUBJECT_DIR"
          shopt -s nullglob
          subjects=("$SUBJECT_DIR"/*.json)
          ((${#subjects[@]} == 1))
          test "${subjects[0]}" = "$SUBJECT_DIR/$SUBJECT_NAME"
          printf '%s  %s\n' "$EXPECTED_PROOF_SHA256" "$SUBJECT_DIR/$SUBJECT_NAME" |
            sha256sum --check --strict
      - name: Attest the exact M-1001 proof subject
        uses: actions/attest-build-provenance@0f67c3f4856b2e3261c31976d6725780e5e4c373 # v4
        with:
          subject-path: ${{ runner.temp }}/factory-proof-m1001/M-1001-370bc991d0d42c746b2f0e3240dbdc529813adf0-proof.json
      - name: Confirm the attested proof subject is unchanged
        env:
          SUBJECT_FILE: ${{ runner.temp }}/factory-proof-m1001/M-1001-370bc991d0d42c746b2f0e3240dbdc529813adf0-proof.json
          EXPECTED_PROOF_SHA256: b540c9aa3cb6152b226da7ae6a8bacf4cb43de1fe83064f1e5c779914ed9aca7
        run: >-
          printf '%s  %s\n' "$EXPECTED_PROOF_SHA256" "$SUBJECT_FILE" |
          sha256sum --check --strict
