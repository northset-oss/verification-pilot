# Test suite + public-surface consistency checks. Runs no untrusted code — only this
# repository's own tests (the Docker integration test runs a fixed command in alpine:3.20).

name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Run the test suite (including the real-Docker executor test)
        env:
          EXECUTOR_DOCKER_TEST: "1"
        run: node --test

      - name: Every committed mission receipt must pass the policy validator
        run: |
          set -euo pipefail
          for mission in missions/*/mission.json; do
            node bin/validate-mission.mjs "$mission"
          done

      - name: Every committed bundle must verify against its manifest
        run: |
          set -euo pipefail
          for bundle in missions/*/bundle; do
            node bin/bundle.mjs verify "$(dirname "$bundle")"
          done

      - name: The signed bundle is the source of truth — no split-brain receipt
        run: |
          set -euo pipefail
          for mission in missions/*/mission.json; do
            node bin/verify-receipt-parity.mjs "$(dirname "$mission")"
          done

      - name: The public ledger index and complete receipt site must match committed sources
        run: |
          set -euo pipefail
          generated_at="$(node -e 'const fs=require("fs");process.stdout.write(JSON.parse(fs.readFileSync("missions/index.json","utf8")).generated_at ?? "")')"
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          node bin/ledger.mjs build --missions-dir missions --out "$work/index.json" --now "$generated_at"
          diff -u missions/index.json "$work/index.json"
          node bin/ledger.mjs render --index "$work/index.json" --out "$work/site/index.html"
          diff -ru site "$work/site"
