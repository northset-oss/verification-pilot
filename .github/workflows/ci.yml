# Validate source, immutable evidence, and generated public projections. On a main push this
# workflow also packages the one changed bundle (or a signed no-op marker) for downstream signing.
name: ci

on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  pr-disclosure:
    name: pr-disclosure
    runs-on: ubuntu-latest
    timeout-minutes: 5
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"
      - name: Enforce future contributor receipt disclosure
        env:
          GITHUB_TOKEN: ${{ github.token }}
        run: >-
          node bin/pr-receipt-disclosure.mjs check
          --missions-dir missions
          --policy policies/pr_receipt_disclosure_policy.json
          --json

  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
        with:
          fetch-depth: 0
      - uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020 # v4
        with:
          node-version: "20"

      - name: Run the complete test suite
        env:
          EXECUTOR_DOCKER_TEST: "1"
        run: node --test

      - name: Validate every committed receipt and signed bundle projection
        run: |
          set -euo pipefail
          for mission in missions/*/mission.json; do
            directory="$(dirname "$mission")"
            node bin/validate-mission.mjs "$mission"
            node bin/bundle.mjs verify "$directory"
            node bin/verify-receipt-parity.mjs "$directory"
            node bin/verify-proof-of-pass.mjs "$directory"
          done

      - name: Confirm committed ledger and site are reproducible
        run: |
          set -euo pipefail
          generated_at="$(node -e 'const fs=require("fs");process.stdout.write(JSON.parse(fs.readFileSync("missions/index.json","utf8")).generated_at ?? "")')"
          work="$(mktemp -d)"
          trap 'rm -rf "$work"' EXIT
          node bin/ledger.mjs build --missions-dir missions --out "$work/index.json" --now "$generated_at"
          diff -u missions/index.json "$work/index.json"
          node bin/ledger.mjs render --index "$work/index.json" --out "$work/site/index.html"
          diff -ru site "$work/site"

      - name: Package exact changed bundle for the signing workflow
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          BEFORE_SHA: ${{ github.event.before }}
          HEAD_SHA: ${{ github.sha }}
        run: |
          set -euo pipefail
          out="$RUNNER_TEMP/ci-release"
          mkdir -p "$out"
          changed="$(git diff --name-only "${BEFORE_SHA}..${HEAD_SHA}" -- ':(glob)missions/*/bundle/**' | cut -d/ -f2 | sort -u)"
          count="$(printf '%s\n' "$changed" | grep -c . || true)"
          if [ "$count" -gt 1 ]; then
            echo "more than one bundle changed in ${BEFORE_SHA}..${HEAD_SHA}" >&2
            exit 1
          fi
          if [ "$count" -eq 0 ]; then
            jq -n --arg head_sha "$HEAD_SHA" '{schema_version:1,no_op:true,head_sha:$head_sha,mission_id:null,bundle:null,bundle_digest:null,release_tag:null}' > "$out/metadata.json"
            exit 0
          fi
          mission="$changed"
          digest="$(jq -r '.bundle_digest' "missions/${mission}/bundle/bundle.manifest.json")"
          short="${digest#sha256:}"
          short="${short:0:12}"
          bundle="run-record-${mission}-${short}.tar.gz"
          tag="run-record-${mission}-${short}"
          tar --sort=name --mtime='UTC 2020-01-01' --owner=0 --group=0 --numeric-owner -czf "$out/$bundle" -C "missions/${mission}" bundle
          jq -n --arg head_sha "$HEAD_SHA" --arg mission_id "$mission" --arg bundle "$bundle" --arg bundle_digest "$digest" --arg release_tag "$tag" \
            '{schema_version:1,no_op:false,head_sha:$head_sha,mission_id:$mission_id,bundle:$bundle,bundle_digest:$bundle_digest,release_tag:$release_tag}' > "$out/metadata.json"

      - name: Upload CI-validated signing handoff
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: ci-release-${{ github.sha }}
          path: ${{ runner.temp }}/ci-release
          if-no-files-found: error
          retention-days: 7
