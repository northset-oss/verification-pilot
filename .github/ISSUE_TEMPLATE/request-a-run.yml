name: Request a run
description: Public intake for a private, consent-first run of a pull request's declared checks
title: "[Run request] "
labels: ["run-request"]
assignees: []
body:
- type: markdown
  attributes:
    value: |
      ## Before you submit
      This issue is public. Do not include secrets, private repository details, credentials, or other sensitive information. For a private request, email oss@northset.ai instead.

      Northset runs repository-declared checks in an isolated container and returns the run record privately by default. We do not modify the PR. Nothing is published without your additional approval. Free during the pilot.
- type: input
  id: pr_url
  attributes:
    label: Pull request URL
    description: The public GitHub pull request you want Northset to check.
    placeholder: https://github.com/owner/repository/pull/123
  validations:
    required: true
- type: input
  id: repository
  attributes:
    label: Repository
    description: The public owner/repository name.
    placeholder: owner/repository
  validations:
    required: true
- type: dropdown
  id: relationship
  attributes:
    label: Your relationship to the repository
    options:
      - Maintainer
      - Authorized organization member
      - Other
  validations:
    required: true
- type: dropdown
  id: requested_checks
  attributes:
    label: Checks to run
    description: Choose repository defaults unless you need a narrower or different declared command set.
    options:
      - Repository defaults
      - Specific checks described below
    default: 0
  validations:
    required: true
- type: textarea
  id: check_details
  attributes:
    label: Specific checks or context
    description: If you selected specific checks, list them here. Do not include secrets.
    placeholder: Leave blank to use repository defaults.
- type: dropdown
  id: private_by_default
  attributes:
    label: Keep the run record private by default?
    options:
      - "Yes"
      - "No"
    default: 0
  validations:
    required: true
- type: dropdown
  id: publish_later
  attributes:
    label: Would you consider publishing the run record later?
    description: This is not publication approval. Northset will ask separately before publishing anything.
    options:
      - Decide later
      - "Yes"
      - "No"
    default: 0
  validations:
    required: true
- type: input
  id: preferred_contact
  attributes:
    label: Preferred contact
    description: This field is public. Use a GitHub username or another non-sensitive contact route; email oss@northset.ai if you prefer not to post it here.
    placeholder: "@username"
  validations:
    required: true
- type: checkboxes
  id: consent
  attributes:
    label: Authorization and consent
    options:
      - label: I am authorized to request this run for the repository and PR above. I understand this issue is public. The run record will remain private by default. Nothing is published without my additional approval.
        required: true
